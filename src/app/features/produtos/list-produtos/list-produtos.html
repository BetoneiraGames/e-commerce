<h2>
    Produto Selecionado:
    @if (produtoSelecionado()){
        <strong style="color:green;">
            {{ produtoSelecionado() | uppercase }}
        </strong>
    }@else {
        <span style="color:rgb(255, 0, 0);"> Nenhum </span>
    }
</h2>


@for (item of produtos(); track item){
    <app-produto 
     [nome] = "item.nome"
    [preco] = "item.preco"
    (produtoSelecionado) = exibirProduto($event)
    ></app-produto>
}
<p>
    <button (click)="adicionarProduto()">Adicionar Produto</button>
</p>
<h2>Total de produtos {{ totalProdutos() }}</h2>
<h3>Valor total: {{valorTotal() | precoFormatado}}</h3>
<P>
    <button (click)="substituirProdutos()">Substituir Produto</button>
</P>
